version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: edupodcast_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: edupodcast_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edupodcast_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: edupodcast_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@edupodcast.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - edupodcast_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Optional: Redis for caching (future feature)
  redis:
    image: redis:7-alpine
    container_name: edupodcast_redis
    ports:
      - "6379:6379"
    networks:
      - edupodcast_network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  edupodcast_network:
    driver: bridge
